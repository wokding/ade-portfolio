  <!-- Animated Browser Tab Title -->
  <script>
    const isMobile = window.innerWidth <= 768;

    const titleMap = {
      about: isMobile
        ? "👋 About • "
        : "👋 About | Ade Naufal Rianto • ",

      "cover-letter": isMobile
        ? "✉️ Cover Letter • "
        : "✉️ Cover Letter | Ade Naufal Rianto • ",

      skills: isMobile
        ? "🧠 Skills • "
        : "🧠 Technical Skills | Ade Naufal Rianto • ",

      certifications: isMobile
        ? "📜 Certifications • "
        : "📜 Certifications | Ade Naufal Rianto • ",

      education: isMobile
        ? "🎓 Education • "
        : "🎓 Education | Ade Naufal Rianto • ",

      experience: isMobile
        ? "🛠 Experience • "
        : "🛠 Experience | Ade Naufal Rianto • ",

      projects: isMobile
        ? "🚀 Projects • "
        : "🚀 Projects & Achievements | Ade Naufal Rianto • ",
    };

    const defaultTitle = isMobile
      ? "👨‍💻 Ade | Network Engineer • "
      : "👨‍💻 Ade Naufal Rianto | Network Engineer • ";

    let currentText = defaultTitle;
    let index = 0;
    let animationInterval = null;

    function animateTitle() {
      document.title =
        currentText.substring(index) + currentText.substring(0, index);
      index = (index + 1) % currentText.length;
    }

    function syncTitleWithNavbar() {
      const activeLink = document.querySelector(".nav-link.active");

      if (!activeLink) {
        currentText = defaultTitle;
        return;
      }

      const targetId = activeLink.getAttribute("href").replace("#", "");
      if (titleMap[targetId] && titleMap[targetId] !== currentText) {
        currentText = titleMap[targetId];
        index = 0;
      }
    }

    function startAnimation() {
      if (!animationInterval) {
        animationInterval = setInterval(animateTitle, 300);
      }
    }

    function stopAnimation() {
      clearInterval(animationInterval);
      animationInterval = null;
    }

    // Visibility API — pause when tab inactive
    document.addEventListener("visibilitychange", () => {
      if (document.hidden) {
        stopAnimation();
      } else {
        startAnimation();
      }
    });

    // Initial start
    startAnimation();
    setInterval(syncTitleWithNavbar, 200);
  </script>
